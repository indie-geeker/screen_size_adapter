name: screen_size_adapter
description: Binding-level screen-size adapter for Flutter, with multi-view support.
version: 0.4.0
homepage: https://github.com/indie-geeker/screen_size_adapter
repository: https://github.com/indie-geeker/screen_size_adapter
issue_tracker: https://github.com/indie-geeker/screen_size_adapter/issues

environment:
  sdk: ^3.7.2
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

