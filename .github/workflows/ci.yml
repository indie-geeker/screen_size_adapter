name: CI

on:
  push:
    branches:
      - main
      - master
      - 'codex/**'
  pull_request:

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies (package)
        run: flutter pub get

      - name: Analyze (package)
        run: flutter analyze

      - name: Test (package)
        run: flutter test

      - name: Install dependencies (example)
        working-directory: example
        run: flutter pub get

      - name: Test (example)
        working-directory: example
        run: flutter test
