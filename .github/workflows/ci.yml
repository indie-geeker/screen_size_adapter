name: CI

on:
  push:
    branches:
      - main
      - master
      - 'codex/**'
  pull_request:

jobs:
  package:
    name: Package (Flutter ${{ matrix.flutter-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - flutter-version: '3.29.2'
            release-gates: false
          - flutter-version: latest-stable
            release-gates: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter (minimum supported)
        if: matrix.flutter-version != 'latest-stable'
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: ${{ matrix.flutter-version }}

      - name: Setup Flutter (latest stable)
        if: matrix.flutter-version == 'latest-stable'
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies (package)
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Analyze (package)
        run: flutter analyze

      - name: Verify README snippet fixtures
        run: dart run tool/verify_readme_snippets.dart

      - name: Test (package)
        run: flutter test

      - name: Install dependencies (example)
        working-directory: example
        run: flutter pub get

      - name: Analyze (example)
        working-directory: example
        run: flutter analyze

      - name: Test (example)
        working-directory: example
        run: flutter test

      - name: Check API docs
        if: matrix.release-gates == true
        run: dart doc --dry-run

      - name: Validate pub package
        if: matrix.release-gates == true
        run: flutter pub publish --dry-run
